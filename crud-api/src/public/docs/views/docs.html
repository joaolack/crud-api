<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>CRUD API Docs</title>
        <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
        <style>
            :root {
                color-scheme: light;
                --page-bg: #f6f4ef;
                --ink: #1f2933;
                --muted: #5d6673;
                --accent: #0f766e;
                --line: #d9d2c3;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: var(--page-bg);
                color: var(--ink);
                font-family: "Segoe UI", Candara, Calibri, sans-serif;
            }

            .topbar {
                border-bottom: 1px solid var(--line);
                background: #fffdf8;
            }

            .topbar-inner {
                width: min(1180px, calc(100% - 32px));
                margin: 0 auto;
                padding: 22px 0 18px;
            }

            .eyebrow {
                margin: 0 0 6px;
                color: var(--accent);
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0;
                text-transform: uppercase;
            }

            h1 {
                margin: 0;
                font-size: clamp(28px, 4vw, 46px);
                line-height: 1;
            }

            .subtitle {
                max-width: 680px;
                margin: 10px 0 0;
                color: var(--muted);
                font-size: 16px;
                line-height: 1.5;
            }

            #swagger-ui {
                width: min(1180px, calc(100% - 32px));
                margin: 24px auto 48px;
                background: #fffdf8;
                border: 1px solid var(--line);
                border-radius: 8px;
                overflow: hidden;
            }

            .swagger-ui .topbar {
                display: none;
            }
        </style>
    </head>
    <body>
        <header class="topbar">
            <div class="topbar-inner">
                <p class="eyebrow">OpenAPI 3.0</p>
                <h1>CRUD API Docs</h1>
                <p class="subtitle">
                    Interactive documentation for the PHP user CRUD API running on
                    <strong>http://localhost:8000</strong>.
                </p>
            </div>
        </header>

        <main id="swagger-ui"></main>

        <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
        <script>
            window.addEventListener('load', () => {
                SwaggerUIBundle({
                    url: '/docs/openapi.yaml',
                    dom_id: '#swagger-ui',
                    deepLinking: true,
                    presets: [
                        SwaggerUIBundle.presets.apis,
                    ],
                    layout: 'BaseLayout',
                });
            });
        </script>
    </body>
</html>
